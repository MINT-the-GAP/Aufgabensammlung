name: Generate WebSite

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run_exporter:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Set up dependencies
        run: npm install -g @liascript/exporter

      - name: Check out current repository
        uses: actions/checkout@v4

      - name: Prepare patch template
        run: cp index.html ziel.html

      - name: Generate WebSite
        run: liaex -i project.yml --format project --output index --project-search

      - name: Patch index
        run: node patch.js

      - name: Minify HTML (disabled for JS stability)
        run: echo "Skipping minify: custom JS must remain unmodified to avoid regex parse errors."

      - name: Prepare Deployment Directory
        run: |
          mkdir -p gh-pages-deploy
          mv index.html gh-pages-deploy/
          cp -r pics gh-pages-deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-deploy
